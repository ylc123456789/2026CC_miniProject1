<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Buzz Submission</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="badge">{{ mode }} Mode</div>
        <h1>Campus Buzz</h1>
        <p class="subtitle">Submit a campus event for automated review.</p>

        <form method="post" action="/submit" class="form-grid">
            <label>
                <span>Title</span>
                <input type="text" name="title" placeholder="AI Seminar for Students">
            </label>

            <label>
                <span>Location</span>
                <input type="text" name="location" placeholder="Engineering Building">
            </label>

            <label>
                <span>Date (YYYY-MM-DD)</span>
                <input type="text" name="date" placeholder="2026-04-22">
            </label>

            <label>
                <span>Organiser Name</span>
                <input type="text" name="organiser_name" placeholder="School Office">
            </label>

            <label class="full-width">
                <span>Description</span>
                <textarea name="description" rows="7" placeholder="Describe the event in at least 40 characters."></textarea>
            </label>

            <div class="full-width actions">
                <button type="submit">Submit Event</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
